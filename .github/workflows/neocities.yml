name: Deploy to Neocities

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v1
      with:
        api_key: ${{ secrets.NEOCITIES_API_TOKEN }}
        cleanup: false 
        dist_dir: . # <--- ADD THIS LINE TO DEPLOY THE ROOT FOLDER
